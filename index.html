<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d5f63" />
    <meta
      name="description"
      content="Mapa interactivo de opciones para comprar bombas perifericas equivalentes o superiores a Forest Garden BP 813, con orden por ubicacion."
    />
    <title>Mapa de bombas AMBA</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Listado de opciones">
        <header class="brand-bar">
          <div>
            <p class="section-kicker">Compra de bomba periferica</p>
            <h1>Mapa de bombas AMBA</h1>
          </div>
        </header>

        <nav class="filter-row" aria-label="Filtros">
          <button class="filter-chip active" type="button" data-filter="all">Todas</button>
          <button class="filter-chip" type="button" data-filter="top">Recomendadas</button>
          <button class="filter-chip" type="button" data-filter="nearby">Cerca mio</button>
          <button class="filter-chip" type="button" data-filter="retail">Cadenas</button>
        </nav>

        <div class="results-meta" id="resultsMeta" aria-live="polite"></div>
        <div class="store-list" id="storeList"></div>
      </aside>

      <main class="map-area">
        <div class="map-toolbar">
          <button
            class="tool-button"
            id="fitButton"
            type="button"
            aria-label="Ver todas las opciones"
            title="Ver todas las opciones"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 9V4h5" />
              <path d="M20 9V4h-5" />
              <path d="M4 15v5h5" />
              <path d="M20 15v5h-5" />
            </svg>
          </button>
        </div>

        <div id="map" aria-label="Mapa de tiendas en AMBA"></div>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
